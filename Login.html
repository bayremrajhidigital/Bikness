<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bikness | Identification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
        }
        /* High-end gradient background mixing Light Blue and Dark Blue */
        .hero-bg { 
            background: radial-gradient(circle at 50% 50%, #0a192f 0%, #000000 100%); 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Glassmorphism effect for the login card */
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(56, 189, 248, 0.15); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Custom styling for inputs */
        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.05);
            outline: none;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
        }
    </style>
</head>
<body class="hero-bg p-6">

    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter">
                BIK<span class="text-sky-500">NESS</span>
            </h1>
            <p class="text-[10px] uppercase tracking-[0.5em] text-gray-500 mt-4 font-bold">
                Elite Performance Base
            </p>
        </div>

        <div class="glass-card p-10 rounded-[2.5rem] relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-2xl font-black italic uppercase mb-8 border-l-4 border-sky-500 pl-4 tracking-tight">
                    Identification
                </h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2 tracking-widest">Athlete Email</label>
                        <input type="email" id="email" 
                               class="input-field w-full px-5 py-4 rounded-2xl text-sm text-white" 
                               placeholder="name@base.com">
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold text-gray-400 mb-2 tracking-widest">Security Key</label>
                        <input type="password" id="password" 
                               class="input-field w-full px-5 py-4 rounded-2xl text-sm text-white" 
                               placeholder="••••••••">
                    </div>

                    <div class="pt-2 space-y-4">
                        <button onclick="window.loginEmail()" 
                                class="w-full bg-sky-500 hover:bg-white text-black font-black py-4 rounded-2xl text-[11px] uppercase tracking-[0.2em] transition-all transform active:scale-95 shadow-lg shadow-sky-500/20">
                            Authorize Entry
                        </button>

                        <div class="relative flex py-2 items-center">
                            <div class="flex-grow border-t border-white/5"></div>
                            <span class="flex-shrink mx-4 text-gray-700 text-[10px] font-bold">OR</span>
                            <div class="flex-grow border-t border-white/5"></div>
                        </div>

                        <button onclick="window.loginGoogle()" 
                                class="w-full bg-white/5 border border-white/10 hover:bg-white/10 text-white font-bold py-4 rounded-2xl text-[11px] uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4" alt="Google">
                            Google Identity Sync
                        </button>
                    </div>
                </div>

                <div class="mt-10 text-center border-t border-white/5 pt-8">
                    <p class="text-gray-500 text-[11px] uppercase tracking-widest">
                        New to the base? 
                        <a href="signup.html" class="text-sky-500 font-black hover:text-white transition-colors ml-2">
                            Create Account
                        </a>
                    </p>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center opacity-30">
            <p class="text-[9px] uppercase tracking-[0.4em]">System Version 2.0.26</p>
        </footer>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
