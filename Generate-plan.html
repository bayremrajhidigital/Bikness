<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bikness | Smart Bio-Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .bg-animate { background: radial-gradient(circle at 50% 20%, #0c2445 0%, #000 70%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px; }
        
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.05); border-radius: 10px; height: 3px; width: 100%; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #fff; cursor: pointer; border: 2px solid #00d2ff; box-shadow: 0 0 10px rgba(0, 210, 255, 0.5); }

        .status-dot { height: 4px; border-radius: 2px; flex: 1; transition: all 0.4s ease; opacity: 0.1; }
        .active-dot { opacity: 1; box-shadow: 0 0 8px currentColor; }
        
        .stat-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-animate flex items-center justify-center p-6">

    <div class="w-full max-w-md space-y-6">
        
        <div class="text-center mb-4">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">BIK<span class="text-sky-400">NESS</span></h1>
            <p class="text-[8px] text-gray-500 tracking-[0.5em] font-bold uppercase mt-1">Bio-Metric Protocol</p>
        </div>

        <div id="input-section" class="glass p-8 space-y-8">
            <div id="status-box" class="bg-white/5 rounded-2xl p-4 border border-white/5 text-center transition-all duration-500">
                <div id="status-text" class="text-sm font-black uppercase tracking-widest text-gray-500">Awaiting Data</div>
                <div class="flex gap-2 mt-3 px-4">
                    <div id="dot-under" class="status-dot bg-yellow-400 text-yellow-400"></div>
                    <div id="dot-perfect" class="status-dot bg-green-500 text-green-500"></div>
                    <div id="dot-over" class="status-dot bg-red-600 text-red-600"></div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="space-y-3">
                    <div class="flex justify-between items-end">
                        <label class="text-[9px] font-bold text-gray-400 tracking-widest uppercase">Mass (Kg)</label>
                        <span id="w-label" class="text-2xl font-black italic text-white">75</span>
                    </div>
                    <input type="range" id="weight" min="30" max="250" value="75" oninput="sync()">
                </div>

                <div class="space-y-3">
                    <div class="flex justify-between items-end">
                        <label class="text-[9px] font-bold text-gray-400 tracking-widest uppercase">Stature (Cm)</label>
                        <span id="h-label" class="text-2xl font-black italic text-white">175</span>
                    </div>
                    <input type="range" id="height" min="100" max="220" value="175" oninput="sync()">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold text-gray-400 tracking-widest uppercase">Gender</label>
                        <select id="gender" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none font-bold text-xs appearance-none">
                            <option value="male" class="bg-black">Male</option>
                            <option value="female" class="bg-black">Female</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold text-gray-400 tracking-widest uppercase">Age</label>
                        <input type="number" id="age" value="22" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none font-bold text-xs focus:border-sky-400">
                    </div>
                </div>
            </div>

            <button onclick="generatePlan()" id="btn-text" class="w-full bg-white text-black font-black py-4 rounded-xl uppercase tracking-[0.3em] text-[10px] hover:bg-sky-400 transition-all">
                Initialize Protocol_
            </button>
        </div>

        <div id="result-section" class="glass p-8 space-y-6 hidden animate-in fade-in zoom-in duration-500">
            <div class="text-center">
                <h2 id="res-status" class="text-2xl font-black italic uppercase text-sky-400">---</h2>
                <p id="res-id" class="text-[8px] text-gray-500 tracking-widest mt-1">---</p>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="stat-card p-4 text-center">
                    <p class="text-[8px] font-bold text-gray-500 uppercase">Calories</p>
                    <div id="res-cal" class="text-xl font-black text-white">---</div>
                </div>
                <div class="stat-card p-4 text-center">
                    <p class="text-[8px] font-bold text-gray-500 uppercase">Protein</p>
                    <div id="res-prot" class="text-xl font-black text-white">---</div>
                </div>
            </div>

            <div class="stat-card p-4 text-center">
                <p class="text-[8px] font-bold text-gray-500 uppercase">AI Advice</p>
                <div id="res-advice" class="text-[10px] font-medium text-gray-400 italic mt-1">---</div>
            </div>

            <button onclick="location.reload()" class="w-full border border-white/10 text-white font-black py-3 rounded-xl uppercase tracking-[0.3em] text-[9px] hover:bg-white/5 transition-all">
                New Scan_
            </button>
        </div>

        <p class="text-[8px] text-center text-gray-700 uppercase tracking-widest">
            Neural Link Status: <span class="text-sky-500" id="link-status">Stable</span>
        </p>

    </div>

    <script>
        function sync() {
            const w = document.getElementById('weight').value;
            const h = document.getElementById('height').value;
            const bmi = w / ((h/100)**2);

            document.getElementById('w-label').innerText = w;
            document.getElementById('h-label').innerText = h;

            const text = document.getElementById('status-text');
            const dots = {
                under: document.getElementById('dot-under'),
                perfect: document.getElementById('dot-perfect'),
                over: document.getElementById('dot-over')
            };

            Object.values(dots).forEach(d => d.classList.remove('active-dot'));
            
            if(bmi < 18.5) {
                text.innerText = "Underweight";
                text.style.color = "#fbbf24";
                dots.under.classList.add('active-dot');
            } else if(bmi >= 18.5 && bmi <= 25) {
                text.innerText = "Perfect Condition";
                text.style.color = "#22c55e";
                dots.perfect.classList.add('active-dot');
            } else {
                text.innerText = "Excess Mass";
                text.style.color = "#ef4444";
                dots.over.classList.add('active-dot');
            }
        }

        async function generatePlan() {
            const btn = document.getElementById('btn-text');
            const linkStatus = document.getElementById('link-status');
            
            // جمع البيانات
            const payload = {
                weight: document.getElementById('weight').value,
                height: document.getElementById('height').value,
                gender: document.getElementById('gender').value,
                age: document.getElementById('age').value,
                bmi: (document.getElementById('weight').value / ((document.getElementById('height').value/100)**2)).toFixed(2)
            };

            // تحريك التحميل
            btn.innerText = "ANALYZING BIOMETRICS...";
            btn.disabled = true;
            linkStatus.innerText = "PROCESSING";

            try {
                // الاتصال بالباك أند (plan.js)
                const response = await fetch('http://localhost:3000/api/generate-protocol', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.success) {
                    // إخفاء المدخلات وإظهار النتيجة بعد تأخير بسيط للجمالية
                    setTimeout(() => {
                        document.getElementById('input-section').classList.add('hidden');
                        document.getElementById('result-section').classList.remove('hidden');
                        
                        // تعبئة البيانات من plan.js
                        document.getElementById('res-status').innerText = result.data.status;
                        document.getElementById('res-id').innerText = `ID: ${result.data.protocolName}`;
                        document.getElementById('res-cal').innerText = result.data.dailyTarget.calories;
                        document.getElementById('res-prot').innerText = result.data.dailyTarget.protein;
                        document.getElementById('res-advice').innerText = result.data.recommendation;
                        
                        linkStatus.innerText = "STABLE";
                    }, 1000);
                }
            } catch (error) {
                alert("Backend Error. Make sure server.js is running.");
                btn.innerText = "Initialize Protocol_";
                btn.disabled = false;
            }
        }

        sync();
    </script>
</body>
</html>
