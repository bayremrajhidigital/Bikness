<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bikness | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* نفس خلفية الـ Homepage */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #05070a; 
            color: #ffffff; 
            overflow: hidden; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        /* تأثير التوهج الأزرق في الخلفية */
        .hero-bg { 
            background: radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.12) 0%, transparent 65%); 
        }
        .gradient-text {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center hero-bg p-6">

    <div class="max-w-md w-full">
        <div class="text-center mb-10">
            <a href="index.html" class="text-4xl font-black italic tracking-tighter">
                BIK<span class="gradient-text">NESS</span>
            </a>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.4em] mt-3 italic">The base of fitness</p>
        </div>

        <div class="glass p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-sky-500/10 blur-3xl rounded-full"></div>
            
            <h2 class="text-2xl font-black italic uppercase mb-8 tracking-tighter">Access Base</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-[9px] uppercase font-bold text-gray-500 mb-2 tracking-[0.2em]">Email Address</label>
                    <input type="email" id="email" class="w-full bg-white/5 border border-white/10 px-4 py-3.5 rounded-xl outline-none focus:border-sky-500 transition-all text-sm text-white placeholder:text-gray-700" placeholder="name@example.com">
                </div>

                <div>
                    <label class="block text-[9px] uppercase font-bold text-gray-500 mb-2 tracking-[0.2em]">Password</label>
                    <input type="password" id="password" class="w-full bg-white/5 border border-white/10 px-4 py-3.5 rounded-xl outline-none focus:border-sky-500 transition-all text-sm text-white placeholder:text-gray-700" placeholder="••••••••">
                </div>

                <button onclick="loginWithEmail()" class="w-full bg-sky-500 hover:bg-white text-black font-black py-4 rounded-xl text-[10px] uppercase tracking-[0.3em] transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-sky-500/20">
                    Sign In
                </button>

                <div class="relative flex py-4 items-center">
                    <div class="flex-grow border-t border-white/5"></div>
                    <span class="flex-shrink mx-4 text-gray-700 text-[9px] uppercase font-black tracking-widest">OR</span>
                    <div class="flex-grow border-t border-white/5"></div>
                </div>

                <button onclick="loginWithGoogle()" class="w-full bg-white/5 border border-white/10 hover:bg-white/10 text-white font-bold py-4 rounded-xl text-[10px] uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4" alt="Google">
                    Continue with Google
                </button>
            </div>

            <div class="mt-10 text-center">
                <p class="text-gray-600 text-[11px] uppercase tracking-widest">New athlete? <a href="#" onclick="signUpWithEmail()" class="text-sky-500 font-black hover:underline">Create Base</a></p>
            </div>
        </div>

        <footer class="mt-16 text-center">
            <p class="text-gray-700 text-[9px] uppercase tracking-[0.5em] font-medium">© 2026 C</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1gtjDSC1ek2PM8zYvRVpxCpoISmR8QuA",
            authDomain: "bikness-ebef7.firebaseapp.com",
            projectId: "bikness-ebef7",
            storageBucket: "bikness-ebef7.firebasestorage.app",
            messagingSenderId: "586672790553",
            appId: "1:586672790553:web:1fa67abdf7659a14215e88",
            measurementId: "G-D80CMTGKMQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.loginWithEmail = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "dashboard.html";
            } catch (error) { alert(error.message); }
        };

        window.signUpWithEmail = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                alert("Base Created!");
            } catch (error) { alert(error.message); }
        };

        window.loginWithGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "dashboard.html";
            } catch (error) { alert(error.message); }
        };
    </script>
</body>
</html>
