<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bikness | Deploy Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .hero-bg { 
            background: radial-gradient(circle at 50% 50%, #0a192f 0%, #000 100%); 
            min-height: 100vh; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(56, 189, 248, 0.15); 
        }
    </style>
</head>
<body class="hero-bg flex items-center justify-center p-6">

    <div class="max-w-md w-full glass p-10 rounded-[2.5rem]">
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-black italic tracking-tighter">BIK<span class="text-sky-500">NESS</span></h1>
            <p class="text-[9px] uppercase tracking-[0.5em] text-gray-500 mt-2 font-bold">New Athlete Registration</p>
        </div>

        <div class="space-y-5">
            <div>
                <input type="text" id="fullname" placeholder="Full Name" 
                class="w-full bg-black/40 border border-white/5 p-4 rounded-xl outline-none focus:border-sky-500 transition text-sm">
            </div>
            <div>
                <input type="email" id="email" placeholder="Email Address" 
                class="w-full bg-black/40 border border-white/5 p-4 rounded-xl outline-none focus:border-sky-500 transition text-sm">
            </div>
            <div>
                <input type="password" id="password" placeholder="Password (Min. 6 characters)" 
                class="w-full bg-black/40 border border-white/5 p-4 rounded-xl outline-none focus:border-sky-500 transition text-sm">
            </div>
            
            <button onclick="window.signUpEmail()" 
                class="w-full bg-white text-black font-black py-4 rounded-xl uppercase tracking-widest hover:bg-sky-500 transition-all transform active:scale-95">
                Create Account
            </button>
            
            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-white/5"></div>
                <span class="mx-4 text-gray-700 text-[10px] font-bold uppercase">OR</span>
                <div class="flex-grow border-t border-white/5"></div>
            </div>

            <button onclick="window.loginGoogle()" 
                class="w-full bg-white/5 border border-white/10 hover:bg-white/10 py-4 rounded-xl flex items-center justify-center gap-3 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4" alt="G">
                <span class="text-xs font-bold uppercase tracking-widest">Google Identity Sync</span>
            </button>
        </div>

        <p class="mt-8 text-center text-xs text-gray-500 uppercase tracking-widest">
            Already registered? <a href="login.html" class="text-sky-500 font-bold hover:text-white transition">login</a>
        </p>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
